version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: primetradeai_db
    restart: always
    environment:
      POSTGRES_DB: primetradeai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetradeai_backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: primetradeai_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 7d
    depends_on:
      - postgres

volumes:
  postgres_data: